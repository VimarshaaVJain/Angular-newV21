<div class="app-cls">
    <h1>Simple Counter</h1>
    <p class="counter-cls">{{counter}}</p>
    <div class="btns">
        <button class="inc-btn" (click)="onClick('add')">+</button>
        <button class="dec-btn" (click)="onClick('sub')">-</button>
        <button class="reset-btn" (click)="onClick('reset')">Reset</button>
    </div>
</div>
