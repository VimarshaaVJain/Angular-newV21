<h2>Signal</h2>

<p>Value : {{value}}</p>

<p>Count : {{count()}}</p>

<button (click)="count.set(15)">Change Signal</button>

<!-- <button (click)="value++">Change Value</button>   //gives runtime error -->

<!-- Counter App using Signals -->
<div class="counter-cls">
    <h1>Counter App</h1>

    <p class="count-txt">{{count()}}</p>
    <div class='btns'>
        <button class="inc-btn" (click)="increament()">+</button>
        <button class="dec-btn" (click)="decrement()">-</button>
        <button class="reset-btn" (click)="reset()">Reset</button>
    </div>
</div>
