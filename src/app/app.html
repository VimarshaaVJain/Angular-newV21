<input (input)="updateName($event.target.value)" placeholder="Enter your Name">
<p>Your Name: {{name}}</p>

<input (input)="city = $event.target.value" placeholder="Enter your City">
<p>Your City: {{city}}</p>

<input #userInput placeholder="Enter your Email">
<button (click)="getAge(userInput.value)">Get Email</button>
<p>Your Email: {{email}}</p>
